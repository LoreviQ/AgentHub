services:
  postgres:
    image: postgres:16
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenthub -d agenthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  alembic-migrate:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: agenthub-backend:local
    env_file:
      - ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  load-sync:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: agenthub-backend:local
    env_file:
      - ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      alembic-migrate:
        condition: service_completed_successfully
    volumes:
      - ./agents:/app/agents:ro
      - ./schemas:/app/schemas:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      [
        "python",
        "/app/scripts/load_local_agents.py",
        "--agents-dir",
        "/app/agents",
        "--schema-path",
        "/app/schemas/agent.schema.json",
        "--tool-image-mode",
        "build-local",
        "--tool-image-tag-prefix",
        "agenthub-local"
      ]
    restart: "no"

  backend-api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: agenthub-backend:local
    env_file:
      - ./backend/.env.prod
    depends_on:
      postgres:
        condition: service_healthy
      alembic-migrate:
        condition: service_completed_successfully
      load-sync:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["backend"]
    restart: unless-stopped

volumes:
  postgres_data:
