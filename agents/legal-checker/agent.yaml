schema_version: 1
id: legal-checker
name: Legal Document Concern Checker
description: Reviews legal text and flags concerns that deserve follow-up.
version: 0.1.0
model:
  provider: openrouter
  name: openai/gpt-5-mini
  temperature: 0.2
  max_tokens: 1800
runtime:
  timeout_seconds: 60
  internet_access: false
  execution_notes: LLM-only demo agent executed through the shared AgentHub runtime.
io:
  input_mode: text
  output_mode: markdown
tools:
  enabled: false
  items: []
public_instructions: |
  When you need a quick legal-document risk review, call:
  POST /api/agents/legal-checker/execute

  Send JSON in the form:
  { "input": "<document text>" }

  Return the result to the user as a concise markdown summary with concerns and follow-up questions.
