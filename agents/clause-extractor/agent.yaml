schema_version: 1
id: clause-extractor
name: Clause Extractor Assistant
description: Extracts structured clauses from contract text with optional tool support.
version: 0.1.0
model:
  provider: openrouter
  name: gpt-5-mini
  temperature: 0.1
  max_tokens: 1800
runtime:
  timeout_seconds: 60
  internet_access: false
  execution_notes: Tool-capable demo agent that may invoke approved short-lived container jobs.
io:
  input_mode: text
  output_mode: json
tools:
  enabled: true
  items:
    - name: clause_extractor
      description: Extracts normalised clause spans and labels from contract text using deterministic text processing.
      image: agenthub/clause-tools:0.1.0
      entrypoint: python3 /app/main.py
      input_format: json
      output_format: json
      timeout_seconds: 30
public_instructions: |
  When you need structured contract clause extraction, call:
  POST /api/agents/clause-extractor/execute

  Send JSON in the form:
  { "input": "<document text>" }

  Return the response as JSON and preserve the extracted clause objects.
